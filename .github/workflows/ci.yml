name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install ruff
      - run: ruff check .

  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev,viz,jax]"
      # non-fatal: cells without an openpmd-api / uproot wheel just skip those tests
      - run: python -m pip install -e ".[openpmd]" || echo "openpmd extra unavailable; tests will skip"
      - run: python -m pip install -e ".[root]" || echo "root extra unavailable; tests will skip"
      - run: python -m pip install -e ".[xsuite]" || echo "xsuite extra unavailable; tests will skip"
      - run: python -m pytest -q
