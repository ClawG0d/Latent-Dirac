<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- self-contained. The 3D HTML is generated locally with plotly inlined
         and shown in a sandbox="allow-scripts" srcdoc iframe: an opaque origin
         that does not inherit this strict CSP, so the trusted local plotly
         scripts run in isolation. connect-src 'none' blocks exfiltration. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; frame-src 'self'; connect-src 'none'"
    />
    <title>Latent Dirac</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <div class="titlebar">
        <div class="dots"><i></i><i></i><i></i></div>
        <span>Latent Dirac</span>
      </div>

      <div class="body">
        <div class="col col-left">
          <section class="card viewport" aria-label="3D view">
            <header class="card__head">
              <span class="card__lbl">Scene</span>
              <span id="view-meta" class="card__meta"></span>
            </header>
            <div class="card__body">
              <div id="placeholder" class="viz__placeholder">
                Describe a beamline below — it runs locally and appears here in 3D.
              </div>
              <iframe
                id="frame"
                class="viz__frame"
                title="3D simulation"
                sandbox="allow-scripts"
                hidden
              ></iframe>
            </div>
          </section>

          <div class="splitter splitter--h" data-resize="viewport" data-axis="y" title="Drag to resize"></div>

          <section class="card chat" aria-label="Chat">
            <header class="card__head">
              <span class="card__lbl">Assistant</span>
              <div class="tools">
                <button id="new-scene" type="button" title="Start a fresh scene">New</button>
                <button id="save-scene" type="button" title="Save the current scene">Save</button>
                <button id="load-scene" type="button" title="Load a scene file">Load</button>
                <button id="key-btn" type="button" title="Set your Anthropic API key">Key</button>
              </div>
            </header>
            <div class="card__body chat__body">
              <div id="log" class="clog" aria-live="polite"></div>
              <div id="status" class="status" hidden></div>
              <form id="form" class="composer">
                <textarea
                  id="prompt"
                  class="field"
                  rows="2"
                  placeholder="a positron pair through a solenoid into an aperture"
                  autofocus
                ></textarea>
                <button id="send" type="submit" class="run">Run</button>
              </form>
            </div>
          </section>
        </div>

        <div class="splitter splitter--v" data-resize="col-left" data-axis="x" title="Drag to resize"></div>

        <div class="col col-right">
          <section class="card physics" aria-label="Physics">
            <header class="card__head">
              <span class="card__lbl">Physics</span>
              <span id="phys-live" class="card__meta"></span>
            </header>
            <div class="card__body"><div id="stats" class="stats"></div></div>
          </section>

          <div class="splitter splitter--h" data-resize="physics" data-axis="y" title="Drag to resize"></div>

          <section class="card tools-card" aria-label="Tools">
            <header class="card__head tabbar">
              <button class="tab active" type="button" data-tab="ledger">Ledger</button>
              <button class="tab" type="button" data-tab="inspector">Inspector</button>
              <button class="tab" type="button" data-tab="sweep">Sweep</button>
            </header>
            <div class="card__body"><div id="tabbody" class="tabbody"></div></div>
          </section>
        </div>
      </div>
    </div>
    <script src="panels.js"></script>
    <script src="splitters.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
