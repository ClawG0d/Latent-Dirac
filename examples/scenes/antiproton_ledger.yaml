schema_version: 1
name: antiproton-ledger
seed: 2027
source:
  type: antiproton_surrogate
  label: pbar-source
  params: { primary_proton_count: 50000, yield_pbar_per_primary_in_acceptance: 2.0e-5,
            central_momentum_GeV_c: 3.0, momentum_spread_fraction: 0.08,
            angular_rms_rad: 0.012, source_sigma_m: 0.002, bunch_length_s: 2.0e-12,
            macro_particles: 96 }
solver: { type: relativistic_boris, dt_s: 4.0e-11, steps: 120 }
elements:
  - { type: uniform_field, label: transport-field, B_vector_t: [0.0, 0.0, 1.5], steps: 120 }
  - { type: aperture, label: beam-pipe, radius_m: 0.05, z_m: 1.2 }
  - { type: momentum_window, label: momentum-cut, p_min_gev_c: 2.85, p_max_gev_c: 3.15 }
  - { type: monitor, label: end-station }
