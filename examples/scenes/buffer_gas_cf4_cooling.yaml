schema_version: 1
name: buffer-gas-cf4-cooling
seed: 2026
# A few-eV positron cloud thermalising in CF4 — the FAST Surko cooling gas,
# whose low-threshold vibrational modes (the real coolant is the nu3 mode,
# ~0.16 eV) remove energy efficiently well below the positronium threshold.
# Injected below the toy table's electronic/positronium thresholds (9.0 / 9.4
# eV), so cooling proceeds through elastic + vibrational channels with no
# annihilation losses.
#
# FIDELITY: the referenced CF4 table is a SYNTHETIC placeholder (see its
# header) — the element reports the "parameterized" tier. Swap in a curated,
# DOI-cited table (fidelity_tier: table-based) to promote it. No cross-section
# value here is physical data.
source:
  type: positron_pair
  label: ev-cloud
  params: { primary_count: 10000, yield_eplus_per_primary: 0.02, mean_energy_MeV: 4.0e-6,
            energy_spread_MeV: 8.0e-7, angular_rms_rad: 0.3, source_sigma_m: 0.001,
            bunch_length_s: 1.0e-10, macro_particles: 128 }
solver: { type: relativistic_boris, dt_s: 1.0e-9, steps: 1 }
elements:
  - { type: buffer_gas_cooling, label: cf4-cooler, hold_time_s: 1.0e-4,
      gas_temperature_k: 300.0, gas_pressure_pa: 0.13,
      cross_section_path: ../data/cross_sections/cf4_positron_toy.csv }
  - { type: monitor, label: cooled }
