schema_version: 1
name: decel-capture
seed: 2026
source:
  type: positron_pair
  label: kev-bunch
  params: { primary_count: 10000, yield_eplus_per_primary: 0.02, mean_energy_MeV: 0.002,
            energy_spread_MeV: 0.0002, angular_rms_rad: 0.02, source_sigma_m: 0.0008,
            bunch_length_s: 1.0e-12, macro_particles: 96 }
solver: { type: relativistic_boris, dt_s: 4.0e-12, steps: 200 }
elements:
  # injection: magnetic guide only (magnets bend and confine - they do no work)
  - { type: uniform_field, label: injection-guide, B_vector_t: [0.0, 0.0, 0.5], steps: 200 }
  # electrostatic decelerator: the E field does the work, B keeps the beam together
  - { type: uniform_field, label: decelerator,
      E_vector_v_m: [0.0, 0.0, -30000.0], B_vector_t: [0.0, 0.0, 0.5], steps: 800 }
  # dynamic capture: the ENTIRE trap field (well + axial B) is gated on only
  # after the bunch has coasted field-free into the trap region (idealized
  # instantaneous switching)
  - { type: penning_trap, label: capture-trap, v0_volt: 800.0, d_m: 0.012, b_tesla: 0.5,
      center_z_m: 0.09, t_on_s: 5.1e-9, t_off_s: 1.0, steps: 2500 }
  - { type: monitor, label: trap-monitor }
