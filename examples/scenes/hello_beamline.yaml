schema_version: 1
name: hello-beamline
seed: 2026
source:
  type: positron_pair
  label: pair-source
  params: { primary_count: 10000, yield_eplus_per_primary: 0.02, mean_energy_MeV: 3.0,
            energy_spread_MeV: 0.5, angular_rms_rad: 0.1, source_sigma_m: 0.003,
            bunch_length_s: 1.0e-12, macro_particles: 64 }
solver: { type: relativistic_boris, dt_s: 3.0e-12, steps: 100 }
elements:
  - { type: solenoid, label: hello-solenoid, b_tesla: 0.8, radius_m: 0.02, length_m: 0.12, center_z_m: 0.06,
      profile: thin_sheet }
  - { type: aperture, label: hello-aperture, radius_m: 0.008, z_m: 0.1 }
  - { type: monitor, label: hello-monitor }
