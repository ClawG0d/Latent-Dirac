schema_version: 1
name: wien-filter
seed: 2026
source:
  type: positron_pair
  label: pair-source
  params: { primary_count: 10000, yield_eplus_per_primary: 0.02, mean_energy_MeV: 0.5,
            energy_spread_MeV: 0.12, angular_rms_rad: 0.02, source_sigma_m: 0.002,
            bunch_length_s: 1.0e-12, macro_particles: 96 }
solver: { type: relativistic_boris, dt_s: 5.0e-12, steps: 140 }
elements:
  # E_x = v_matched * B_y balances the Lorentz force for the design velocity
  - { type: uniform_field, label: wien-cell,
      E_vector_v_m: [12936000.0, 0.0, 0.0], B_vector_t: [0.0, 0.05, 0.0], steps: 140 }
  - { type: aperture, label: velocity-slit, radius_m: 0.004, z_m: 0.18 }
  - { type: monitor, label: end-station }
